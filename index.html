<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARVELL | Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --panel-bg: #161618;
            --card-bg: #1a1a1d;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --header-h: 70px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow-x: hidden; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        header {
            height: var(--header-h); background: rgba(13, 13, 15, 0.85); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between; padding: 0 4%;
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 30px; }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: #fff; }
        .logo-icon { width: 26px; height: 26px; background: var(--accent); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .user-nav-links { display: flex; align-items: center; gap: 18px; margin-right: 10px; }
        .nav-item { display: flex; align-items: center; gap: 8px; color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 500; transition: var(--transition); }
        .nav-item:hover { color: #fff; }
        .nav-item i { width: 18px; }

        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 4px 4px 12px; border-radius: 50px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); position: relative; }
        .profile-trigger:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .profile-trigger img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); }

        /* --- DROPDOWN (Иконки близко к тексту) --- */
        #userDropdown {
            position: absolute; top: 55px; right: 0; width: 240px; background: #161618; border: 1px solid #252525;
            border-radius: 16px; display: none; flex-direction: column; padding: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); animation: fadeIn 0.2s ease;
        }
        .drop-header { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 5px; border-bottom: 1px solid #222; }
        .drop-header:hover { background: #222; }
        .drop-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .drop-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: #eee; text-decoration: none; font-size: 14px; border-radius: 10px; transition: 0.2s; cursor: pointer; }
        .drop-link:hover { background: #222; color: #fff; }
        .drop-link i { width: 18px; color: var(--text-dim); }
        .drop-link:hover i { color: #fff; }

        .drop-link.logout { color: #ff5555; border-top: 1px solid #252525; margin-top: 5px; padding-top: 15px; }
        .drop-link.logout i { color: #ff5555; }

        /* --- CATEGORY TAGS --- */
        .category-section { max-width: 1200px; margin: 25px auto 0; padding: 0 20px; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: #1a1a1d; color: var(--accent); padding: 10px 22px; border-radius: 10px;
            text-decoration: none; font-size: 14px; font-weight: 600; transition: var(--transition);
            border: 1px solid transparent; cursor: pointer;
        }
        .tag:hover { background: #252529; transform: translateY(-2px); }
        .tag.active { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); color: #60a5fa; }

        /* --- MAIN CONTENT --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; animation: fadeIn 0.6s ease; }
        .page-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-sell { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-sell:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #222; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .price { font-size: 22px; font-weight: 800; margin: 15px 0; }
        .btn-buy { width: 100%; padding: 12px; background: #2a2a2e; border: none; color: #fff; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* --- PROFILE PAGE --- */
        .profile-card { background: #121214; border-radius: 20px; overflow: hidden; border: 1px solid #222; animation: fadeIn 0.5s ease; }
        .profile-banner { height: 180px; background: linear-gradient(45deg, #0f172a, #1e293b); background-image: url('https://w.forfun.com/fetch/51/515286571550974f762f2d9061036495.jpeg'); background-size: cover; background-position: center; }
        .profile-inner { padding: 0 40px 40px; display: grid; grid-template-columns: 1fr 340px; gap: 40px; }
        
        .profile-left { margin-top: -60px; }
        .p-avatar { width: 120px; height: 120px; border-radius: 50%; border: 6px solid #121214; object-fit: cover; background: #222; margin-bottom: 20px; }
        .p-nick { font-size: 26px; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .p-status { color: #10b981; font-size: 14px; font-weight: 600; margin-bottom: 25px; display: block; }
        
        .p-bio-box { margin-top: 30px; border-top: 1px solid #222; padding-top: 25px; }
        .p-bio-title { color: var(--text-dim); font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 12px; }
        .p-bio-text { color: #ccc; font-style: italic; font-size: 15px; margin: 0; }

        .profile-right { margin-top: 30px; }
        .stat-panel { background: #1a1a1d; border-radius: 16px; padding: 25px; border: 1px solid #252525; }
        .stat-item { margin-bottom: 20px; }
        .stat-item span { color: var(--text-dim); font-size: 13px; display: block; margin-bottom: 5px; }
        .stat-item b { font-size: 16px; color: #fff; }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: #18181b; width: 90%; max-width: 380px; padding: 35px; border-radius: 24px; text-align: center; border: 1px solid #333; position: relative; }
        .modal-content input { width: 100%; padding: 14px; background: #0a0a0b; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn-full { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; }

        @media (max-width: 900px) {
            .profile-inner { grid-template-columns: 1fr; padding: 0 20px 30px; }
            .user-nav-links { display: none; }
            .grid { grid-template-columns: 1fr 1fr; }
            .header-left { gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo" onclick="location.reload()">
                <div class="logo-icon"></div>
                <div class="logo-text">STARVELL</div>
            </div>
        </div>
        
        <div class="header-right">
            <!-- Панель для вошедшего -->
            <div id="loggedUI" style="display:none; align-items:center;">
                <div class="user-nav-links">
                    <a href="#" class="nav-item"><i data-lucide="message-square"></i><span>Сообщения</span></a>
                    <a href="#" class="nav-item"><i data-lucide="wallet"></i><span>Кошелек</span></a>
                </div>
                <div class="profile-trigger" onclick="toggleDrop(event)">
                    <span id="navNick" style="font-weight:600; font-size:14px">Ник</span>
                    <img id="navAva" src="" alt="">
                    
                    <div id="userDropdown">
                        <div class="drop-header" onclick="openProfile()">
                            <img id="dropAva" src="" alt="">
                            <div>
                                <div id="dropNick" style="font-weight:700">Имя</div>
                                <span style="font-size:12px; color:var(--text-dim)">Открыть профиль</span>
                            </div>
                        </div>
                        <div class="drop-link"><i data-lucide="shopping-bag"></i>Покупки</div>
                        <div class="drop-link"><i data-lucide="list"></i>Продажи</div>
                        <div class="drop-link"><i data-lucide="help-circle"></i>Помощь</div>
                        <div class="drop-link"><i data-lucide="headphones"></i>Поддержка</div>
                        <div class="drop-link"><i data-lucide="settings"></i>Настройки</div>
                        <div class="drop-link logout" onclick="logout()"><i data-lucide="log-out"></i>Выйти из аккаунта</div>
                    </div>
                </div>
            </div>

            <!-- Кнопки для гостя -->
            <div id="guestUI" style="display:flex; align-items:center; gap:20px">
                <a href="#" class="nav-item" style="color:var(--text-dim)">Помощь</a>
                <a href="#" class="nav-item" style="color:var(--text-dim)">Русский</a>
                <button class="btn-sell" style="padding:8px 20px" onclick="openMod('loginMod')">Войти</button>
            </div>
        </div>
    </header>

    <div id="catSection" class="category-section">
        <div class="tags-container" id="tagsBox">
            <div class="tag active" onclick="openPage(this, 'Звёзды')">Звёзды</div>
            <div class="tag" onclick="openPage(this, 'Подарки')">Подарки</div>
            <div class="tag" onclick="openPage(this, 'Premium')">Premium</div>
            <div class="tag" onclick="openPage(this, 'Каналы')">Каналы</div>
            <div class="tag" onclick="openPage(this, 'Услуги')">Услуги</div>
            <div class="tag" onclick="openPage(this, 'Аренда')">Аренда</div>
            <div class="tag" onclick="openPage(this, 'Юзернеймы')">Юзернеймы</div>
            <div class="tag" onclick="openPage(this, 'Аккаунты')">Аккаунты</div>
            <div class="tag" onclick="openPage(this, 'Боты')">Боты</div>
            <div class="tag" onclick="openPage(this, 'Прочее')">Прочее</div>
        </div>
    </div>

    <main class="container" id="viewBox"></main>

    <!-- МОДАЛКИ -->
    <div id="loginMod" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Вход</h2>
            <input type="text" id="lU" placeholder="Логин">
            <input type="password" id="lP" placeholder="Пароль">
            <button class="btn-full" onclick="login()">Войти</button>
            <p style="font-size:13px; color:#555; margin-top:15px">Нет аккаунта? <span style="color:var(--accent); cursor:pointer" onclick="openMod('regMod')">Регистрация</span></p>
        </div>
    </div>

    <div id="regMod" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Регистрация</h2>
            <input type="text" id="rU" placeholder="Логин">
            <input type="password" id="rP" placeholder="Пароль">
            <button class="btn-full" onclick="reg()">Создать аккаунт</button>
        </div>
    </div>

    <div id="setMod" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Настройка ника</h2>
            <input type="text" id="sN" placeholder="Ваш Никнейм">
            <button class="btn-full" onclick="saveSet()">Завершить</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleDrop(e) { e.stopPropagation(); const d = document.getElementById('userDropdown'); d.style.display = d.style.display === 'flex' ? 'none' : 'flex'; }
        window.onclick = () => document.getElementById('userDropdown').style.display = 'none';

        function openMod(id) { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById(id).style.display = 'flex'; }
        function closeMods() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function openPage(el, title) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active')); el.classList.add('active');
            document.getElementById('catSection').style.display = 'block';
            let html = `<div class="page-title-row"><h1>${title}</h1><button class="btn-sell">Продать ${title}</button></div><div class="grid">`;
            for(let i=1; i<=8; i++) {
                html += `<div class="card"><i data-lucide="package" style="color:var(--accent)"></i><div style="font-weight:700; margin:15px 0 5px">${title} Объявление #${i}</div><div class="price">${(Math.random()*600+100).toFixed(0)} ₽</div><button class="btn-buy">Купить</button></div>`;
            }
            document.getElementById('viewBox').innerHTML = html + `</div>`;
            lucide.createIcons();
        }

        function openProfile() {
            const u = localStorage.getItem('currentUser');
            const d = JSON.parse(localStorage.getItem('user_'+u));
            document.getElementById('catSection').style.display = 'none';
            document.getElementById('viewBox').innerHTML = `
                <div class="profile-card">
                    <div class="profile-banner"></div>
                    <div class="profile-inner">
                        <div class="profile-left">
                            <img src="${d.avatar || 'https://ui-avatars.com/api/?name='+d.nickname}" class="p-avatar">
                            <h2 class="p-nick">${d.nickname}</h2>
                            <span class="p-status">Онлайн</span>
                            <div class="p-bio-box">
                                <div class="p-bio-title"><span>Обо мне</span><span style="color:var(--accent); cursor:pointer" onclick="editBio()">Редактировать</span></div>
                                <p class="p-bio-text">${d.bio || 'Здесь пока пусто...'}</p>
                            </div>
                        </div>
                        <div class="profile-right">
                            <div class="stat-panel">
                                <div class="stat-item"><span>Дата регистрации</span><b>${d.regDate}</b></div>
                                <div class="stat-item"><span>Рейтинг продавца</span><b>? из 5</b></div>
                                <div style="color:var(--accent); font-weight:700; font-size:14px; cursor:pointer">0 отзывов</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function editBio() {
            const u = localStorage.getItem('currentUser'); const d = JSON.parse(localStorage.getItem('user_'+u));
            const n = prompt("О себе:", d.bio); if(n !== null) { d.bio = n; localStorage.setItem('user_'+u, JSON.stringify(d)); openProfile(); }
        }

        function reg() {
            const u = document.getElementById('rU').value; const p = document.getElementById('rP').value;
            if(!u || !p) return alert("Заполните поля!");
            const date = new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
            localStorage.setItem('user_'+u, JSON.stringify({username:u, password:p, isFirst:true, regDate:date, bio:''}));
            openMod('loginMod');
        }

        function login() {
            const u = document.getElementById('lU').value; const p = document.getElementById('lP').value;
            const d = JSON.parse(localStorage.getItem('user_'+u));
            if(d && d.password === p) { localStorage.setItem('currentUser', u); d.isFirst ? openMod('setMod') : location.reload(); }
            else alert("Ошибка входа!");
        }

        function saveSet() {
            const n = document.getElementById('sN').value; const u = localStorage.getItem('currentUser');
            const d = JSON.parse(localStorage.getItem('user_'+u));
            if(!n) return alert("Введите ник!"); d.nickname = n; d.isFirst = false;
            localStorage.setItem('user_'+u, JSON.stringify(d)); location.reload();
        }

        function logout() { localStorage.removeItem('currentUser'); location.reload(); }

        window.onload = () => {
            const u = localStorage.getItem('currentUser');
            if(u) {
                const d = JSON.parse(localStorage.getItem('user_'+u));
                document.getElementById('guestUI').style.display = 'none';
                document.getElementById('loggedUI').style.display = 'flex';
                document.getElementById('navNick').innerText = d.nickname;
                const ava = d.avatar || "https://ui-avatars.com/api/?name="+d.nickname;
                document.getElementById('navAva').src = ava;
                document.getElementById('dropAva').src = ava;
                document.getElementById('dropNick').innerText = d.nickname;
            }
            openPage(document.querySelector('.tag'), 'Звёзды');
        };
    </script>
</body>
</html>
